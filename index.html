<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track My Roots</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* 🌙 BACKGROUND */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('/images/background.png') center/cover no-repeat fixed;
            color: white;
        }

        /* 🎨 OVERLAY */
        .overlay {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(16, 185, 129, 0.3));
        }

        /* 📦 LAYOUT */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        /* 💎 CARDS */
        .card,
        .panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .logo {
            height: 55px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        /* SEARCH */
        .search-box {
            display: flex;
            gap: 10px;
            position: relative;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .search-box input::placeholder {
            color: #ccc;
        }

        .search-box button {
            padding: 12px 18px;
            background: #10b981;
            border: none;
            color: white;
            border-radius: 10px;
        }

        /* SUGGESTIONS */
        #suggestionsBox {
            position: absolute;
            top: 50px;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 10px;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* SPECIES */
        #speciesContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }

        .species-box {
            background: rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        /* MAIN */
        .main {
            display: none;
            margin-top: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .panel {
            flex: 1;
        }

        /* MAP */
        #map {
            height: 320px;
            border-radius: 10px;
        }

        /* 🖼️ IMAGE FIX */
        #treeImage {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* 📍 DISTANCE BOX */
        #distance {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* LOADER */
        .spinner {
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* MOBILE */
        @media(max-width:768px) {
            .main {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="overlay">
        <div class="container">

            <div class="header">
                <img src="/images/logo.png" class="logo">
                <div class="title">Track My Roots</div>
            </div>

            <div class="card">
                Total Trees: <b id="treeCount"></b>
            </div>

            <h3>🌿 Trees by Species</h3>
            <div id="speciesContainer"></div>

            <div class="search-box">
                <input id="treeInput" placeholder="Search Tree ID or Name">
                <button onclick="lookup()">Search</button>
                <div id="suggestionsBox"></div>
            </div>

            <div id="loader" style="display:none;margin-top:10px;text-align:center;">
                <div class="spinner"></div>
            </div>

            <div class="main">
                <div class="panel">
                    <div id="map"></div>
                </div>

                <div class="panel">
                    <p><b>ID:</b> <span id="id"></span></p>
                    <p><b>Name:</b> <span id="name"></span></p>
                    <p><b>Year:</b> <span id="year"></span></p>
                    <p><b>Maintained:</b> <span id="maintainer"></span></p>
                    <p><b>Roll:</b> <span id="roll"></span></p>
                    <p><b>Email:</b> <span id="email"></span></p>

                    <img id="treeImage">

                    <p id="distance"></p>

                    <button onclick="navigate()">🧭 Navigate</button>
                </div>
            </div>

        </div>
    </div>

    <script>

        let PLANTS = [];
        let map, marker, line;

        const input = document.getElementById("treeInput");
        const suggestionsBox = document.getElementById("suggestionsBox");

        // LOAD CSV
        Papa.parse("trees.csv", {
            download: true,
            header: true,
            complete: function (res) {

                PLANTS = res.data
                    .filter(p => p.tree_id)
                    .map(p => ({
                        ...p,
                        search: (p.tree_id + " " + p.tree_name).toLowerCase()
                    }));

                document.getElementById("treeCount").innerText = PLANTS.length;

                initMap();
                loadSpecies();

            }
        });

        // SPECIES
        function loadSpecies() {
            let species = {};

            PLANTS.forEach(p => {
                species[p.tree_name] = (species[p.tree_name] || 0) + 1;
            });

            let container = document.getElementById("speciesContainer");

            Object.entries(species)
                .sort((a, b) => b[1] - a[1])
                .forEach(([name, count]) => {

                    let div = document.createElement("div");
                    div.className = "species-box";
                    div.innerText = `${name} (${count})`;

                    div.onclick = () => {
                        let plant = PLANTS.find(p => p.tree_name === name);
                        input.value = plant.tree_id;
                        lookup();
                    };

                    container.appendChild(div);
                });
        }

        // MAP
        function initMap() {
            map = L.map('map').setView([16.9797, 82.2426], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // SEARCH
        let timer;
        input.addEventListener("input", () => {
            clearTimeout(timer);

            timer = setTimeout(() => {
                let val = input.value.toLowerCase();

                if (!val) {
                    suggestionsBox.style.display = "none";
                    return;
                }

                let results = PLANTS.filter(p => p.search.includes(val)).slice(0, 10);

                suggestionsBox.innerHTML = results.map(p => `
<div class="suggestion-item" data-id="${p.tree_id}">
<b>${p.tree_id}</b> - ${p.tree_name}
</div>`).join("");

                suggestionsBox.style.display = "block";

            }, 300);
        });

        // CLICK
        suggestionsBox.onclick = (e) => {
            let item = e.target.closest(".suggestion-item");
            input.value = item.dataset.id;
            suggestionsBox.style.display = "none";
            lookup();
        };

        // LOOKUP
        function lookup() {

            document.getElementById("loader").style.display = "block";
            document.querySelector(".main").style.display = "none";

            setTimeout(() => {

                let plant = PLANTS.find(p => p.tree_id == input.value.trim());

                document.getElementById("id").innerText = plant.tree_id;
                document.getElementById("name").innerText = plant.tree_name;
                document.getElementById("year").innerText = plant.planted_year;
                document.getElementById("maintainer").innerText = plant.maintained_by;
                document.getElementById("roll").innerText = plant.roll_no;
                document.getElementById("email").innerText = plant.email_id;

                document.getElementById("treeImage").src =
                    plant.photo || "https://via.placeholder.com/300";

                let p = parseCoords(plant.gps_coordinate);
                let r = parseCoords(plant.reference_point);

                map.setView([p.lat, p.lng], 19);

                if (marker) map.removeLayer(marker);
                marker = L.marker([p.lat, p.lng]).addTo(map);

                if (line) map.removeLayer(line);
                line = L.polyline([[p.lat, p.lng], [r.lat, r.lng]]).addTo(map);

                let d = getDistance(p.lat, p.lng, r.lat, r.lng);

                // 🔥 FINAL FIX HERE
                document.getElementById("distance").innerHTML =
                    `📍 Located <b>${Math.round(d)} m</b> from <b>${plant.department_name}</b>`;

                window.nav = { p, r };

                document.getElementById("loader").style.display = "none";
                document.querySelector(".main").style.display = "flex";

            }, 300);
        }

        // HELPERS
        function parseCoords(s) {
            let a = s.split(",");
            return { lat: parseFloat(a[0]), lng: parseFloat(a[1]) };
        }

        function getDistance(a, b, c, d) {
            let R = 6371000;
            let toRad = x => x * Math.PI / 180;
            let dLat = toRad(c - a);
            let dLon = toRad(d - b);
            let val = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(a)) * Math.cos(toRad(c)) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(val), Math.sqrt(1 - val));
        }

        function navigate() {
            let { p, r } = window.nav;
            window.open(`https://www.google.com/maps/dir/?api=1&origin=${p.lat},${p.lng}&destination=${r.lat},${r.lng}`);
        }

    </script>

</body>

</html>
