<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track My Roots</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial;

            background-image: url('/images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* OVERLAY */
        .overlay {
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            margin: 15px;
        }

        .logo {
            height: 60px;
            width: 60px;
        }

        /* CONTAINER */
        .container {
            padding: 20px;
        }

        /* DASHBOARD */
        .dashboard {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
        }

        /* SEARCH */
        .search-box {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            position: relative;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .search-box button {
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
        }

        /* SUGGESTIONS */
        #suggestionsBox {
            position: absolute;
            top: 50px;
            width: 100%;
            background: white;
            border-radius: 8px;
            display: none;
            max-height: 150px;
            overflow-y: auto;
            z-index: 10;
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #e0f2fe;
        }

        /* SPECIES */
        #speciesContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .species-box {
            background: #d1fae5;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* MAIN */
        .main {
            display: none;
            margin-top: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .panel {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        /* MOBILE */
        @media(max-width:768px) {
            .dashboard {
                flex-direction: column;
            }

            .main {
                flex-direction: column;
            }

            iframe {
                height: 250px;
            }
        }
    </style>
</head>

<body>

    <div class="overlay">

        <!-- HEADER -->
        <div class="header">
            <img src="/images/logo.png" class="logo">
            <div>
                <h2>JNTUK Kakinada — Track My Roots</h2>
                <small>Digital Tree Tracking System</small>
            </div>
        </div>

        <div class="container">

            <!-- DASHBOARD -->
            <div class="dashboard">
                <div class="card">
                    <h3>Total Trees</h3>
                    <p id="treeCount">0</p>
                </div>

                <div class="card">
                    <h3>Top Tree</h3>
                    <p id="topTree">-</p>
                </div>
            </div>

            <!-- SPECIES -->
            <h3>🌿 Trees by Species</h3>
            <div id="speciesContainer"></div>

            <!-- SEARCH -->
            <div class="search-box">
                <input id="treeInput" placeholder="Search Tree ID or Name">
                <button onclick="lookup()">Search</button>
                <div id="suggestionsBox"></div>
            </div>

            <!-- RESULT -->
            <div class="main" id="mainPanel">
                <div class="panel">
                    <iframe id="mapFrame" width="100%" height="300"></iframe>
                </div>

                <div class="panel">
                    <p><b>ID:</b> <span id="id"></span></p>
                    <p><b>Name:</b> <span id="name"></span></p>
                    <p><b>Year:</b> <span id="year"></span></p>
                    <p><b>Maintained By:</b> <span id="maintainer"></span></p>
                    <p><b>Roll No:</b> <span id="roll"></span></p>
                    <p><b>Email:</b> <span id="email"></span></p>
                </div>
            </div>

        </div>

    </div>

    <script>

        let PLANTS = [];

        Papa.parse("trees.csv", {
            download: true,
            header: true,
            complete: function (res) {

                PLANTS = res.data;

                document.getElementById("treeCount").innerText = PLANTS.length;

                const speciesCount = {};

                PLANTS.forEach(p => {
                    const name = p["Tree Name"]?.trim();
                    if (name) {
                        speciesCount[name] = (speciesCount[name] || 0) + 1;
                    }
                });

                const container = document.getElementById("speciesContainer");

                Object.entries(speciesCount)
                    .sort((a, b) => b[1] - a[1])
                    .forEach(([name, count]) => {

                        const div = document.createElement("div");
                        div.className = "species-box";
                        div.innerText = `${name} (${count})`;

                        div.onclick = () => filterBySpecies(name);

                        container.appendChild(div);
                    });

                const top = Object.entries(speciesCount).sort((a, b) => b[1] - a[1])[0];
                if (top) {
                    document.getElementById("topTree").innerText = `${top[0]} (${top[1]})`;
                }
            }
        });

        /* SEARCH SUGGESTIONS */
        const input = document.getElementById("treeInput");
        const suggestionsBox = document.getElementById("suggestionsBox");

        input.addEventListener("input", () => {

            const val = input.value.toLowerCase();

            if (!val) {
                suggestionsBox.style.display = "none";
                return;
            }

            const matches = PLANTS.filter(p =>
                (p["Tree ID"] + " " + p["Tree Name"]).toLowerCase().includes(val)
            ).slice(0, 10);

            suggestionsBox.innerHTML = matches.map(p =>
                `<div class="suggestion-item" data-id="${p["Tree ID"]}">
        [${p["Tree ID"]}] ${p["Tree Name"]}
        </div>`
            ).join("");

            suggestionsBox.style.display = "block";
        });

        suggestionsBox.addEventListener("click", (e) => {
            if (e.target.classList.contains("suggestion-item")) {
                input.value = e.target.dataset.id;
                suggestionsBox.style.display = "none";
                lookup();
            }
        });

        /* SEARCH */
        function lookup() {
            const val = input.value;

            const plant = PLANTS.find(p => p["Tree ID"] == val);

            if (!plant) {
                alert("Not found");
                return;
            }

            document.getElementById("mainPanel").style.display = "flex";

            document.getElementById("id").innerText = plant["Tree ID"];
            document.getElementById("name").innerText = plant["Tree Name"];
            document.getElementById("year").innerText = plant["Planted Year"];
            document.getElementById("maintainer").innerText = plant["maintained by"];
            document.getElementById("roll").innerText = plant["roll no"];
            document.getElementById("email").innerText = plant["email id"];

            document.getElementById("mapFrame").src =
                `https://www.google.com/maps?q=${plant["GPS Coordinate"]}&z=18&output=embed`;
        }

        /* FILTER */
        function filterBySpecies(name) {
            const plant = PLANTS.find(p => p["Tree Name"] === name);
            if (!plant) return;
            document.getElementById("treeInput").value = plant["Tree ID"];
            lookup();
        }

    </script>

</body>

</html>
