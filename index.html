<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Track My Roots</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: url('/images/background.png') center/cover no-repeat;
        }

        /* PAGE LOADER */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }

        .spinner {
            border: 6px solid #eee;
            border-top: 6px solid #10b981;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* SEARCH LOADER */
        #searchLoader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .overlay {
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
        }

        .logo {
            height: 60px;
        }

        .container {
            padding: 20px;
        }

        .dashboard {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .search-box {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            position: relative;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
        }

        .search-box button {
            padding: 10px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
        }

        #suggestionsBox {
            position: absolute;
            top: 45px;
            width: 100%;
            background: white;
            border-radius: 8px;
            display: none;
            max-height: 180px;
            overflow-y: auto;
            z-index: 100;
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #e0f2fe;
        }

        #speciesContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .species-box {
            background: #d1fae5;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .main {
            margin-top: 20px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
        }

        .panel {
            flex: 1;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        #map {
            height: 350px;
            border-radius: 10px;
        }

        #distanceBox {
            margin-top: 10px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 10px;
            cursor: pointer;
        }

        button.navigate {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
        }

        @media(max-width:768px) {
            .main {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <!-- PAGE LOADER -->
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading trees...</p>
    </div>

    <div class="overlay">

        <div class="header">
            <img src="/images/logo.png" class="logo">
            <h2>Track My Roots</h2>
        </div>

        <div class="container">

            <div class="dashboard">
                <div class="card"><b>Total Trees</b><br><span id="treeCount"></span></div>
            </div>

            <h3>🌿 Trees by Species</h3>
            <div id="speciesContainer"></div>

            <div class="search-box">
                <input id="treeInput" placeholder="Search Tree ID or Name">
                <button onclick="lookup()">Search</button>
                <div id="suggestionsBox"></div>
            </div>

            <!-- SEARCH LOADER -->
            <div id="searchLoader">
                <div class="spinner"></div>
                <p>Searching...</p>
            </div>

            <div class="main">

                <div class="panel">
                    <div id="map"></div>
                </div>

                <div class="panel">
                    <p><b>ID:</b> <span id="id"></span></p>
                    <p><b>Name:</b> <span id="name"></span></p>
                    <p><b>Year:</b> <span id="year"></span></p>
                    <p><b>Maintained:</b> <span id="maintainer"></span></p>
                    <p><b>Roll:</b> <span id="roll"></span></p>
                    <p><b>Email:</b> <span id="email"></span></p>

                    <div id="distanceBox">
                        <span id="distance"></span>
                        <div style="font-size:12px;">Click for navigation</div>
                    </div>

                    <button class="navigate" id="navigateBtn">🧭 Navigate</button>

                </div>

            </div>

        </div>
    </div>

    <script>

        let PLANTS = [];
        let map, marker, line;

        const input = document.getElementById("treeInput");
        const suggestionsBox = document.getElementById("suggestionsBox");

        // parse coords
        function parseCoords(str) {
            if (!str) return null;
            let parts = str.split(",");
            return { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
        }

        // distance
        function getDistance(a, b, c, d) {
            let R = 6371000;
            let toRad = x => x * Math.PI / 180;
            let dLat = toRad(c - a);
            let dLon = toRad(d - b);
            let val = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(a)) * Math.cos(toRad(c)) *
                Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(val), Math.sqrt(1 - val));
        }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([16.9797, 82.2426], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // LOAD CSV
        Papa.parse("trees.csv", {
            download: true,
            header: true,
            complete: function (res) {

                console.log(res.data); // debug

                PLANTS = res.data.filter(p => p.tree_id);

                document.getElementById("treeCount").innerText = PLANTS.length;

                // species
                let species = {};
                PLANTS.forEach(p => {
                    if (p.tree_name) species[p.tree_name] = (species[p.tree_name] || 0) + 1;
                });

                Object.entries(species).forEach(([n, c]) => {
                    let d = document.createElement("div");
                    d.className = "species-box";
                    d.innerText = `${n} (${c})`;
                    d.onclick = () => filterBySpecies(n);
                    speciesContainer.appendChild(d);
                });

                initMap();

                // hide loader
                document.getElementById("loader").style.display = "none";

            }
        });

        // SEARCH SUGGESTIONS
        input.addEventListener("input", () => {
            let val = input.value.toLowerCase();

            if (!val) {
                suggestionsBox.style.display = "none";
                return;
            }

            let results = PLANTS.filter(p =>
                (p.tree_id + " " + p.tree_name).toLowerCase().includes(val)
            ).slice(0, 10);

            suggestionsBox.innerHTML = results.map(p => `
<div class="suggestion-item" data-id="${p.tree_id}">
[${p.tree_id}] ${p.tree_name}
</div>`).join("");

            suggestionsBox.style.display = "block";
        });

        suggestionsBox.onclick = (e) => {
            let item = e.target.closest(".suggestion-item");
            if (!item) return;

            input.value = item.dataset.id;
            suggestionsBox.style.display = "none";
            lookup();
        };

        // LOOKUP
        function lookup() {

            document.getElementById("searchLoader").style.display = "block";
            document.querySelector(".main").style.display = "none";

            setTimeout(() => {

                let plant = PLANTS.find(p => p.tree_id == input.value.trim());
                if (!plant) {
                    alert("Not found");
                    document.getElementById("searchLoader").style.display = "none";
                    return;
                }

                document.getElementById("id").innerText = plant.tree_id;
                document.getElementById("name").innerText = plant.tree_name;
                document.getElementById("year").innerText = plant.planted_year;
                document.getElementById("maintainer").innerText = plant.maintained_by || "—";
                document.getElementById("roll").innerText = plant.roll_no || "—";
                document.getElementById("email").innerText = plant.email_id || "—";

                let p = parseCoords(plant.gps_coordinate);
                let r = parseCoords(plant.reference_point);

                map.setView([p.lat, p.lng], 19);

                if (marker) map.removeLayer(marker);
                marker = L.marker([p.lat, p.lng]).addTo(map);

                if (line) map.removeLayer(line);
                line = L.polyline([[p.lat, p.lng], [r.lat, r.lng]], { color: 'green' }).addTo(map);

                let d = getDistance(p.lat, p.lng, r.lat, r.lng);
                let text = d < 1000 ? Math.round(d) + " m" : (d / 1000).toFixed(2) + " km";

                document.getElementById("distance").innerText =
                    `Located ${text} from ${plant.department_name}`;

                distanceBox.dataset.plat = p.lat;
                distanceBox.dataset.plng = p.lng;
                distanceBox.dataset.rlat = r.lat;
                distanceBox.dataset.rlng = r.lng;

                document.getElementById("searchLoader").style.display = "none";
                document.querySelector(".main").style.display = "flex";

            }, 500);
        }

        // FILTER
        function filterBySpecies(name) {
            let p = PLANTS.find(x => x.tree_name == name);
            if (p) {
                input.value = p.tree_id;
                lookup();
            }
        }

        // NAVIGATION
        document.getElementById("navigateBtn").onclick = function () {
            let d = distanceBox.dataset;
            window.open(`https://www.google.com/maps/dir/?api=1&origin=${d.plat},${d.plng}&destination=${d.rlat},${d.rlng}`, "_blank");
        };

        document.getElementById("distanceBox").onclick = function () {
            document.getElementById("navigateBtn").click();
        };

    </script>

</body>

</html>
