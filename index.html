<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track My Roots</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url('/images/background.png') center/cover no-repeat;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            position: relative;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
        }

        .search-box button {
            padding: 10px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
        }

        #suggestionsBox {
            position: absolute;
            top: 45px;
            width: 100%;
            background: white;
            border-radius: 8px;
            display: none;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #eee;
        }

        .main {
            display: none;
            margin-top: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .panel {
            flex: 1;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        #map {
            height: 300px;
        }

        .spinner {
            border: 5px solid #eee;
            border-top: 5px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* 🌿 species */
        #speciesContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .species-box {
            background: #d1fae5;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">
            Total Trees: <b id="treeCount"></b>
        </div>

        <!-- 🌿 Species -->
        <h3>🌿 Trees by Species</h3>
        <div id="speciesContainer"></div>

        <div class="search-box">
            <input id="treeInput" placeholder="Search Tree ID or Name">
            <button onclick="lookup()">Search</button>
            <div id="suggestionsBox"></div>
        </div>

        <div id="loader" style="display:none;text-align:center;margin-top:10px;">
            <div class="spinner"></div>
        </div>

        <div class="main">
            <div class="panel">
                <div id="map"></div>
            </div>

            <div class="panel">
                <p><b>ID:</b> <span id="id"></span></p>
                <p><b>Name:</b> <span id="name"></span></p>
                <p><b>Year:</b> <span id="year"></span></p>
                <p><b>Maintained:</b> <span id="maintainer"></span></p>
                <p><b>Roll:</b> <span id="roll"></span></p>
                <p><b>Email:</b> <span id="email"></span></p>

                <img id="treeImage" width="100%">

                <p id="distance"></p>

                <button onclick="navigate()">🧭 Navigate</button>
            </div>
        </div>

    </div>

    <script>

        let PLANTS = [];
        let map, marker, line;

        const input = document.getElementById("treeInput");
        const suggestionsBox = document.getElementById("suggestionsBox");

        // LOAD CSV
        Papa.parse("trees.csv", {
            download: true,
            header: true,
            complete: function (res) {

                PLANTS = res.data
                    .filter(p => p.tree_id)
                    .map(p => ({
                        ...p,
                        search: (p.tree_id + " " + p.tree_name).toLowerCase()
                    }));

                document.getElementById("treeCount").innerText = PLANTS.length;

                initMap();
                loadSpecies();

            }
        });

        // 🌿 SPECIES FUNCTION
        function loadSpecies() {

            let species = {};

            PLANTS.forEach(p => {
                if (p.tree_name) {
                    species[p.tree_name] = (species[p.tree_name] || 0) + 1;
                }
            });

            let container = document.getElementById("speciesContainer");
            container.innerHTML = "";

            Object.entries(species)
                .sort((a, b) => b[1] - a[1])
                .forEach(([name, count]) => {

                    let div = document.createElement("div");
                    div.className = "species-box";
                    div.innerText = `${name} (${count})`;

                    div.onclick = () => {
                        let plant = PLANTS.find(p => p.tree_name === name);
                        if (plant) {
                            input.value = plant.tree_id;
                            lookup();
                        }
                    };

                    container.appendChild(div);

                });
        }

        // MAP
        function initMap() {
            map = L.map('map').setView([16.9797, 82.2426], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // SEARCH SUGGESTIONS
        let timer;

        input.addEventListener("input", () => {
            clearTimeout(timer);

            timer = setTimeout(() => {

                let val = input.value.toLowerCase().trim();

                if (!val) {
                    suggestionsBox.style.display = "none";
                    return;
                }

                let results = PLANTS.filter(p => p.search.includes(val)).slice(0, 10);

                if (results.length === 0) {
                    suggestionsBox.style.display = "none";
                    return;
                }

                suggestionsBox.innerHTML = results.map(p => `
<div class="suggestion-item" data-id="${p.tree_id}">
<b>${p.tree_id}</b> - ${p.tree_name}
</div>
`).join("");

                suggestionsBox.style.display = "block";

            }, 300);
        });

        // CLICK
        suggestionsBox.addEventListener("click", (e) => {
            let item = e.target.closest(".suggestion-item");
            if (!item) return;

            input.value = item.dataset.id;
            suggestionsBox.style.display = "none";

            lookup();
        });

        // LOOKUP
        function lookup() {

            document.getElementById("loader").style.display = "block";
            document.querySelector(".main").style.display = "none";

            setTimeout(() => {

                let plant = PLANTS.find(p => p.tree_id == input.value.trim());

                if (!plant) {
                    alert("Not found");
                    return;
                }

                document.getElementById("id").innerText = plant.tree_id;
                document.getElementById("name").innerText = plant.tree_name;
                document.getElementById("year").innerText = plant.planted_year;
                document.getElementById("maintainer").innerText = plant.maintained_by;
                document.getElementById("roll").innerText = plant.roll_no;
                document.getElementById("email").innerText = plant.email_id;

                document.getElementById("treeImage").src =
                    plant.photo || "https://via.placeholder.com/300";

                let p = parseCoords(plant.gps_coordinate);
                let r = parseCoords(plant.reference_point);

                map.setView([p.lat, p.lng], 19);

                if (marker) map.removeLayer(marker);
                marker = L.marker([p.lat, p.lng]).addTo(map);

                if (line) map.removeLayer(line);
                line = L.polyline([[p.lat, p.lng], [r.lat, r.lng]]).addTo(map);

                let d = getDistance(p.lat, p.lng, r.lat, r.lng);
                document.getElementById("distance").innerText = "Distance: " + Math.round(d) + " m";

                window.nav = { p, r };

                document.getElementById("loader").style.display = "none";
                document.querySelector(".main").style.display = "flex";

            }, 300);
        }

        // HELPERS
        function parseCoords(s) {
            let a = s.split(",");
            return { lat: parseFloat(a[0]), lng: parseFloat(a[1]) };
        }

        function getDistance(a, b, c, d) {
            let R = 6371000;
            let toRad = x => x * Math.PI / 180;
            let dLat = toRad(c - a);
            let dLon = toRad(d - b);
            let val = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(a)) * Math.cos(toRad(c)) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(val), Math.sqrt(1 - val));
        }

        function navigate() {
            let { p, r } = window.nav;
            window.open(`https://www.google.com/maps/dir/?api=1&origin=${p.lat},${p.lng}&destination=${r.lat},${r.lng}`);
        }

    </script>

</body>

</html>
