<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Tree</title>
  <link rel="stylesheet" href="css/form.css">
</head>
<body class="hero">

<header class="top-bar">
  <h2>🌳 Track My Roots – Add Tree</h2>
</header>

<div class="form-container">
  <form id="treeForm">

    <input required id="treeName" placeholder="Tree Name">
    <input required id="scientificName" placeholder="Scientific Name">
    <input required id="plantedYear" type="number" placeholder="Planted Year">
    <input required id="maintainedBy" placeholder="Maintained By">
    <input required id="rollNo" placeholder="Roll Number">
    <input required id="email" type="email" placeholder="Email">

    <!-- LIVE CAMERA -->
    <input required type="file" id="image" accept="image/*" capture="environment">

    <div class="gps">
      <button type="button" onclick="getLocation()">📍 Detect Live Location</button>
      <p id="locationStatus">Location not detected</p>
    </div>

    <div id="loader" style="display:none; margin:10px 0;">Saving tree...</div>
    <p id="message" style="margin:10px 0;"></p>
    <button type="submit">Save Tree</button>

  </form>
</div>

<script src="js/gps.js" defer></script>
<script src="js/add-tree.js" defer></script>
</body>
</html>
