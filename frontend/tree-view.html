<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TOP HEADER -->
<div class="top-header">
  <div class="logo">
    <img src="images/logo.png">
    <span>Track My Roots</span>
  </div>

  <div>
    <button onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<div class="fade-in" style="padding:20px">

  <!-- ACTION BUTTONS -->
  <div style="margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap">

    <button id="addTreeBtn" style="display:none"
      onclick="window.location.href='add-tree.html'">
      ➕ Add Tree
    </button>

    <button id="editTreeBtn" style="display:none"
      onclick="enableEditMode()">
      ✏️ Edit Tree
    </button>

    <button id="deleteTreeBtn" style="display:none"
      onclick="enableDeleteMode()">
      🗑️ Delete Tree
    </button>

    <button id="createSubAdminBtn" style="display:none"
      onclick="window.location.href='create-subadmin.html'">
      👤 Create Sub Admin
    </button>

  </div>

  <!-- LOADER -->
  <div id="loader" style="display:none">Loading...</div>
  <!-- ERROR -->
  <div id="errorMsg" style="color:red; margin-top:10px;"></div>

  <h3>🌲 Trees List</h3>
  <div id="treeList"></div>

  <!-- MAP -->
  <h3>🗺️ Map View</h3>
  <div id="map" style="height:400px; margin-top:10px;"></div>

</div>

<script src="js/auth.js" defer></script>
<script src="js/tree-view.js" defer></script>

<script>
  const role = localStorage.getItem("role");

  const addTreeBtn = document.getElementById("addTreeBtn");
  const editTreeBtn = document.getElementById("editTreeBtn");
  const deleteTreeBtn = document.getElementById("deleteTreeBtn");
  const createSubAdminBtn = document.getElementById("createSubAdminBtn");

  if (!role) {
    alert("Session expired. Please login again.");
    window.location.href = "login.html";
  }

  if (role === "admin") {
    addTreeBtn.style.display = "inline-block";
    editTreeBtn.style.display = "inline-block";
    deleteTreeBtn.style.display = "inline-block";
    createSubAdminBtn.style.display = "inline-block";
  }

  if (role === "subadmin") {
    addTreeBtn.style.display = "inline-block";
    editTreeBtn.style.display = "inline-block";
  }

  // Highlight searched query (if present)
  const params = new URLSearchParams(window.location.search);
  const searchQuery = params.get("query");

  if (searchQuery) {
    console.log("Searching for:", searchQuery);
    // This will be used in tree-view.js for highlighting
    window.SEARCH_QUERY = searchQuery.toLowerCase();
  }
</script>

<script>
function toggleTheme() {
  const body = document.body;
  body.classList.toggle("dark");

  const btn = document.getElementById("themeBtn");
  btn.innerText = body.classList.contains("dark") ? "☀️" : "🌙";
}

document.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("loaded");
});
</script>
</body>
</html>
