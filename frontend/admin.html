<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Track My Roots</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/admin-dashboard.css">
</head>


<body>
<script>
  const token = localStorage.getItem("token");

  if (!token) {
    alert("Please login first");
    window.location.href = "login.html";
  }
</script>
<!-- TOP HEADER -->
<div class="top-header">
  <div class="logo">
    <img src="images/logo.png">
    <span>Track My Roots</span>
  </div>

  <div style="display:flex; gap:10px;">
    <button onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar slide-in">
  <h2>🌳 Admin</h2>
  <a href="tree-view.html">View Trees</a>
  <a href="audit-logs.html">Audit Logs</a>
  <a href="admin-settings.html">Settings</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main fade-in">

  <!-- HEADER -->
  <div class="header">
    <h1>Dashboard</h1>
  </div>

  <!-- ANALYTICS -->
  <div class="card" style="display:flex; gap:20px; flex-wrap:wrap;">
    <div style="flex:1; background:#e8f5e9; padding:15px; border-radius:8px;">
      <h3>Total Trees</h3>
      <p id="totalTrees">0</p>
    </div>
    <div style="flex:1; background:#e3f2fd; padding:15px; border-radius:8px;">
      <h3>Total Subadmins</h3>
      <p id="totalSubadmins">0</p>
    </div>
  </div>

  <!-- ADD TREE SECTION -->
  <div class="card">
    <h2>🌳 Add Tree</h2>
    <div class="form-group">

    <input id="treeName" placeholder="Tree Name">
    <input id="scientificName" placeholder="Scientific Name">
    <input id="plantedYear" type="number" placeholder="Planted Year">

    <input id="maintainedBy" placeholder="Maintained By">
    <input id="rollNo" placeholder="Roll No">
    <input id="email" placeholder="Email">

    <input id="image" type="file" accept="image/*">

    <button onclick="detectLocation()">📍 Detect Location</button>
    <p id="locStatus"></p>

    <button onclick="addTree()">➕ Add Tree</button>

    <div id="loader" style="display:none; margin-top:10px;">Adding tree...</div>
    <p id="message" style="margin-top:10px;"></p>
    </div>
  </div>

  <!-- CREATE SUBADMIN SECTION -->
  <div class="card">
    <h2>👤 Create Subadmin</h2>
    <div class="form-group">

    <input id="subadminName" placeholder="Name">
    <input id="subadminEmail" placeholder="Email">
    <input id="subadminPassword" type="password" placeholder="Password">

    <button onclick="createSubAdmin()">Create Subadmin</button>
    </div>
  </div>

  <!-- SUBADMIN LIST SECTION -->
  <div class="card">
    <h2>📋 Subadmin List</h2>

    <!-- SEARCH -->
    <input id="subadminSearch" placeholder="🔍 Search subadmin..." oninput="filterSubAdmins()" style="margin-bottom:10px; padding:10px; width:100%; border-radius:6px; border:1px solid #ccc;">

    <!-- LIST -->
    <div id="subadminList">
      Loading subadmins...
    </div>

    <!-- PAGINATION -->
    <div id="pagination" style="margin-top:10px;"></div>
  </div>

</div>

<script src="js/auth.js"></script>
<script src="js/trees-admin.js"></script>
<script src="js/admin.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadSubAdmins();
    loadAnalytics();
  });
 </script>

<script>
/* THEME TOGGLE */
function toggleTheme() {
  const body = document.body;
  body.classList.toggle("dark");

  const btn = document.getElementById("themeBtn");
  btn.innerText = body.classList.contains("dark") ? "☀️" : "🌙";
}

/* PAGE TRANSITION */
document.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("loaded");
});
</script>

</body>
</html>
